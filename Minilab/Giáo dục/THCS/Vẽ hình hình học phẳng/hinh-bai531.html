<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { margin: 0; background: white; }
svg { display: block; }
text { font-family: 'Times New Roman', serif; font-size: 15px; font-style: italic; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="380" viewBox="0 0 520 380">
  <!-- Bài 5.31: (O) R=2, (O') R'=1.5, tiếp xúc ngoài tại A, d tiếp tuyến chung -->
  <!-- scale=60.5, ox=169, oy=302 -->

  <!-- Đường thẳng d -->
  <line x1="36" y1="302" x2="495" y2="302" stroke="black" stroke-width="1.8"/>

  <!-- Đường tròn (O) -->
  <circle cx="169" cy="181" r="121" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Đường tròn (O') -->
  <circle cx="379" cy="211" r="91" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Đoạn OO' (nét phụ) -->
  <line x1="169" y1="181" x2="379" y2="211" stroke="blue" stroke-width="1.4"/>

  <!-- Đoạn OB vuông góc d -->
  <line x1="169" y1="181" x2="169" y2="302" stroke="blue" stroke-width="1.4"/>

  <!-- Đoạn O'C vuông góc d -->
  <line x1="379" y1="211" x2="379" y2="302" stroke="blue" stroke-width="1.4"/>

  <!-- Tiếp tuyến tại A: từ M(274,302) qua A(289,198) đến (302,107) -->
  <line x1="274" y1="302" x2="302" y2="107" stroke="blue" stroke-width="1.6"/>

  <!-- Ký hiệu góc vuông tại B (OB⊥d) -->
  <polyline points="169,287 184,287 184,302" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Ký hiệu góc vuông tại C (O'C⊥d) -->
  <polyline points="379,287 364,287 364,302" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- Chấm điểm -->
  <circle cx="169" cy="181" r="3" fill="black"/>
  <circle cx="379" cy="211" r="3" fill="black"/>
  <circle cx="289" cy="198" r="3" fill="black"/>
  <circle cx="169" cy="302" r="3" fill="black"/>
  <circle cx="379" cy="302" r="3" fill="black"/>
  <circle cx="274" cy="302" r="3" fill="black"/>

  <!-- Nhãn -->
  <text x="150" y="174">O</text>
  <text x="387" y="206">O′</text>
  <text x="295" y="192">A</text>
  <text x="152" y="322">B</text>
  <text x="383" y="322">C</text>
  <text x="264" y="322">M</text>
  <text x="498" y="306">d</text>
</svg>
</body>
</html>
