<html lang="en">
<head>

<link rel="stylesheet" href="../../base.css">

<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">

  <section class="slide slide--center">
    <div class="stack">
      <span class="kicker" data-animate data-slot="kicker">Annual Report · 2026</span>

    </div>
    <span class="folio" data-folio>01</span>
  </section>
  <script src="../js/decor-background.js"></script>
