<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- minimalist · two-column-slide.html
     Side-by-side comparison: two stacked columns each led by a short ink rule. -->
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="../css/theme-tokens.css">
<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <section class="slide">
    <div class="stack fill">
      <span class="kicker" data-animate data-slot="kicker">Comparison</span>
      <h2 class="title" style="font-size:48px" data-animate data-slot="title">Before &amp; after</h2>
      <div class="grid-2" data-animate>
        <div class="stack--tight">
          <div class="divider--ink"></div>
          <h3 class="body" style="font-weight:500" data-slot="left-heading">Before</h3>
          <p class="body" data-slot="left-body">Dense slides, competing colors, and decoration that hides the point.</p>
        </div>
        <div class="stack--tight">
          <div class="divider--ink"></div>
          <h3 class="body" style="font-weight:500" data-slot="right-heading">After</h3>
          <p class="body" data-slot="right-body">A single idea per slide, framed by space and a quiet hierarchy.</p>
        </div>
      </div>
    </div>
    <span class="folio" data-folio>04</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
</body>
</html>
