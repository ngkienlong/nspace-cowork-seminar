<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- minimalist · quote-slide.html
     Pull quote: short ink rule, light large quote, muted attribution. -->
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="../css/theme-tokens.css">
<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <section class="slide slide--center">
    <div class="stack">
      <div class="divider--ink" data-animate></div>
      <blockquote class="quote-text" data-animate data-slot="quote">"Simplicity is the ultimate sophistication."</blockquote>
      <p class="caption" data-animate data-slot="attribution">— Leonardo da Vinci</p>
    </div>
    <span class="folio" data-folio>06</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
</body>
</html>
