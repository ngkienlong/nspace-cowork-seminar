<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- minimalist · bulleted-list-slide.html
     Content slide: kicker, heading, hairline-separated bullet list. -->
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="../css/theme-tokens.css">
<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <section class="slide">
    <div class="stack fill">
      <span class="kicker" data-animate data-slot="kicker">What we cover</span>
      <h2 class="title" style="font-size:48px" data-animate data-slot="title">Key points</h2>
      <ul class="bullets" data-animate data-slot="bullets">
        <li>Strip away everything that doesn't carry meaning.</li>
        <li>Let whitespace do the structural work.</li>
        <li>One accent, used sparingly, earns attention.</li>
        <li>Type hierarchy replaces boxes and color.</li>
      </ul>
    </div>
    <span class="folio" data-folio>03</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
</body>
</html>
