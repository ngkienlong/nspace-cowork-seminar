<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<!-- toan-hoc · big-number-stat-slide.html
     Single hero metric. The number animates via count-up-numbers.js. -->
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="../css/theme-tokens.css">
<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <section class="slide slide--center">
    <div class="stack">
      <span class="kicker" data-animate data-slot="kicker">Kết quả</span>
      <div class="stat-number" data-countup="95" data-suffix="%" data-slot="value">0%</div>
      <p class="subtitle" data-animate data-slot="label">học sinh hoàn thành phiếu bài tập đúng thời gian.</p>
    </div>
    <span class="folio" data-folio>05</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
  <script src="../js/count-up-numbers.js"></script>
</body>
</html>
