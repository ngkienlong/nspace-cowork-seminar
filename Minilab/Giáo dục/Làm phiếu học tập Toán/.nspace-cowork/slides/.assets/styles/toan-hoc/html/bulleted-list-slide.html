<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">

<link rel="stylesheet" href="../../base.css">

<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">

<body>
  <section class="slide">
    <div class="stack fill">
      <span class="kicker" data-animate data-slot="kicker">Kiến thức cần nhớ</span>
      <h2 class="title" style="font-size:48px" data-animate data-slot="title">Các tính chất cơ bản</h2>
      <ul class="bullets" data-animate data-slot="bullets">
        <li>Tổng ba góc trong tam giác bằng 180°.</li>
        <li>Hai tam giác bằng nhau khi có ba cạnh tương ứng bằng nhau.</li>
        <li>Đường trung tuyến chia tam giác thành hai phần có diện tích bằng nhau.</li>
        <li>Định lý Pythagore: a² + b² = c² với tam giác vuông.</li>
      </ul>
    </div>
    <span class="folio" data-folio>03</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
</body>
</html>
