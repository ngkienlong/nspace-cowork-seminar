<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<!-- toan-hoc · two-column-slide.html
     Side-by-side comparison: two stacked columns with accent rules. -->
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="../css/theme-tokens.css">
<link rel="stylesheet" href="../css/typography.css">
<link rel="stylesheet" href="../css/slide-layouts.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <section class="slide">
    <div class="stack fill">
      <span class="kicker" data-animate data-slot="kicker">So sánh</span>
      <h2 class="title" style="font-size:48px" data-animate data-slot="title">Hai phương pháp giải</h2>
      <div class="grid-2" data-animate>
        <div class="stack--tight">
          <div class="divider--ink"></div>
          <h3 class="body" style="font-weight:600" data-slot="left-heading">Phương pháp tổng hợp</h3>
          <p class="body" data-slot="left-body">Suy luận từ giả thiết, dùng tính chất đã biết để dẫn đến kết luận cần chứng minh.</p>
        </div>
        <div class="stack--tight">
          <div class="divider--ink"></div>
          <h3 class="body" style="font-weight:600" data-slot="right-heading">Phương pháp phân tích</h3>
          <p class="body" data-slot="right-body">Xuất phát từ điều cần chứng minh, tìm điều kiện đủ cho đến khi gặp điều đã biết.</p>
        </div>
      </div>
    </div>
    <span class="folio" data-folio>04</span>
  </section>
  <script src="../js/decor-background.js"></script>
  <script src="../js/entrance-animations.js"></script>
</body>
</html>
